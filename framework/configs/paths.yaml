# 飝龘动物园 - 路径配置
# FeidaZoo Path Configuration
# 
# 本文件定义了框架中使用的所有路径
# 支持环境变量覆盖和动态路径解析

# 基础路径配置
# 优先级: 环境变量 FEIDA_ZOO_HOME > 本配置文件 > 默认值
base:
  # 项目根目录
  # 可通过环境变量 FEIDA_ZOO_HOME 覆盖
  root: "${FEIDA_ZOO_HOME:-/home/afei/workspace/panda}"

# 派生路径配置
# 所有路径均基于 base.root 自动计算
derived:
  # 智能体目录 - 存放所有成员工作区
  agents: "${base.root}/agents"
  
  # 框架目录 - 框架核心代码
  framework: "${base.root}/framework"
  
  # 共享资源目录
  shared: "${base.root}/framework/shared"
  
  # 数据目录
  data: "${base.root}/framework/data"
  
  # 配置目录
  configs: "${base.root}/framework/configs"
  
  # 日志目录
  logs: "${base.root}/logs"
  
  # 临时目录
  temp: "/tmp/feida_zoo"

# 特定配置文件路径
config_files:
  # 系统配置
  system: "${derived.configs}/system.yaml"
  
  # 权限配置
  permissions: "${derived.configs}/permissions.yaml"
  
  # 路径配置（本文件）
  paths: "${derived.configs}/paths.yaml"
  
  # 成员注册表
  registry: "${derived.data}/registry.json"

# 路径解析器配置
resolver:
  # 支持的环境变量前缀
  env_prefixes:
    - "FEIDA_ZOO_"
    - "FDZ_"
  
  # 路径占位符模式
  placeholder_pattern: "\\$\\{([^}]+)\\}"
  
  # 默认路径分隔符
  separator: "/"
  
  # 是否自动创建不存在的目录
  auto_create_dirs: false

# 验证规则
validation:
  # 必须存在的路径（运行时检查）
  required_paths:
    - "${derived.framework}"
    - "${derived.configs}"
  
  # 路径权限要求
  permission_checks:
    - path: "${derived.temp}"
      writable: true
    - path: "${derived.logs}"
      writable: true
    - path: "${derived.data}"
      writable: true
