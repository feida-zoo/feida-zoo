      - review
      - review_test
      - test
      - audit
    capabilities:
      - security_audit
      - quality_assurance
      - code_review
      - risk_assessment
    metadata:
      language: zh-CN
      is_main_agent: false
      status: active

  weaver:
    id: weaver
    name: 织巢
    code_name: Weaver
    role: engineer
    display_name: 疯狂工程师
    emoji: 🐜
    species: 蚂蚁
    model: minimax/MiniMax-M2.7
    session:
      key: agent:weaver:main
      channel: internal
    responsible_phases: []
    capabilities:
      - code_implementation
      - feature_development
      - bug_fixing
    metadata:
      language: zh-CN
      is_main_agent: false
      status: inactive   # 已退出活跃成员

  aeterna:
