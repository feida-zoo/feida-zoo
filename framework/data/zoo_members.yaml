    session:
      key: agent:alpha:main
      channel: internal
    responsible_phases:
      - validate
      - design
      - ui_design
      - develop_wt
      - develop_code
    capabilities:
      - architecture_design
      - system_analysis
      - complex_reasoning
      - technical_planning
    metadata:
      language: zh-CN
      is_main_agent: false
      status: active

  duci:
