# 飝龘动物园成员统一配置
# 单文件权威来源 — 修改此处即可影响 ZooRegistry / Dashboard / Pipeline
#
# 模型 ID 必须与 ~/.openclaw/openclaw.json 中 agents.defaults.models 的 key 匹配
# session.key 使用 OpenClaw main session 格式: agent:<id>:main

_version: "1.0.0"
_updated: "2026-05-20"

members:
  panda:
    id: panda
    name: 达达
    code_name: Panda
    role: admin
    display_name: 中枢调度大管家
    emoji: 🐼
    species: 熊猫
    model: minimax/MiniMax-M2.7
    session:
      key: agent:main:main
      channel: internal
    responsible_phases:
      - request
      - final_check
      - deliver
    capabilities:
      - orchestration
      - coordination
      - system_management
      - task_scheduling
    metadata:
      language: zh-CN
      is_main_agent: true
      status: active

  alpha:
    id: alpha
    name: 阿尔法
    code_name: Alpha
    role: architect
    display_name: 首席架构师
    emoji: 🐢
